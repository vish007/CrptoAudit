name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"  # Daily at 2 AM UTC

jobs:
  bandit-scan:
    name: Bandit - Python Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run bandit security scan
        run: |
          bandit -r backend/app/ -f json -o bandit-report.json -ll || true
        continue-on-error: true

      - name: Display bandit results
        run: |
          bandit -r backend/app/ -ll || true
        continue-on-error: true

      - name: Upload bandit report
        uses: actions/upload-artifact@v3
        with:
          name: bandit-security-report
          path: bandit-report.json

  npm-audit:
    name: NPM Audit - JavaScript Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        run: |
          npm audit --audit-level=moderate --json > npm-audit-report.json || true
        continue-on-error: true

      - name: Display npm audit results
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: "."
          format: "JSON"
          args: >
            --enableExperimental
            --enable-retired
        continue-on-error: true

      - name: Upload dependency-check report
        uses: actions/upload-artifact@v3
        with:
          name: dependency-check-report
          path: reports/dependency-check-report.json

  trivy-scan:
    name: Trivy - Container & Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-report.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Upload Trivy filesystem report
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "trivy-fs-report.sarif"
        continue-on-error: true

      - name: Run Trivy rootfs scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "rootfs"
          scan-ref: "/github/workspace"
          format: "json"
          output: "trivy-rootfs-report.json"
        continue-on-error: true

      - name: Upload Trivy rootfs report
        uses: actions/upload-artifact@v3
        with:
          name: trivy-rootfs-report
          path: trivy-rootfs-report.json

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets[gibberish]

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline --force-use-all-plugins 2>&1 | tee secret-scan-results.txt || true
        continue-on-error: true

      - name: Verify against baseline
        run: |
          detect-secrets audit .secrets.baseline || true
        continue-on-error: true

      - name: Upload secret scan results
        uses: actions/upload-artifact@v3
        with:
          name: secret-scan-results
          path: secret-scan-results.txt

  sast-analysis:
    name: SAST - Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run semgrep SAST scan
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten --json --output semgrep-report.json backend/ || true
        continue-on-error: true

      - name: Display semgrep results
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten backend/ || true
        continue-on-error: true

      - name: Upload semgrep report
        uses: actions/upload-artifact@v3
        with:
          name: semgrep-sast-report
          path: semgrep-report.json

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Python license compliance
        uses: python-poetry/poetry@v1
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Check JS license compliance
        working-directory: ./frontend
        run: |
          npm ci
          npx license-report --json > license-report.json || true
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-compliance-report
          path: frontend/license-report.json

  security-report:
    name: Compile Security Report
    runs-on: ubuntu-latest
    needs: [bandit-scan, npm-audit, dependency-check, trivy-scan, secret-scan, sast-analysis, license-check]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v3

      - name: Create summary report
        run: |
          echo "# Security Scan Summary" > SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "Scan Date: $(date)" >> SECURITY_REPORT.md
          echo "Commit: ${{ github.sha }}" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "## Scan Results" >> SECURITY_REPORT.md
          echo "- Bandit Report: [bandit-security-report](bandit-security-report/bandit-report.json)" >> SECURITY_REPORT.md
          echo "- NPM Audit Report: [npm-audit-report](npm-audit-report/npm-audit-report.json)" >> SECURITY_REPORT.md
          echo "- Dependency Check: [dependency-check-report](dependency-check-report/dependency-check-report.json)" >> SECURITY_REPORT.md
          echo "- Trivy Rootfs: [trivy-rootfs-report](trivy-rootfs-report/trivy-rootfs-report.json)" >> SECURITY_REPORT.md
          echo "- Secret Scan: [secret-scan-results](secret-scan-results/secret-scan-results.txt)" >> SECURITY_REPORT.md
          echo "- SAST Analysis: [semgrep-sast-report](semgrep-sast-report/semgrep-report.json)" >> SECURITY_REPORT.md
          echo "- License Report: [license-compliance-report](license-compliance-report/license-report.json)" >> SECURITY_REPORT.md
          echo "" >> SECURITY_REPORT.md
          echo "All reports available in artifacts section." >> SECURITY_REPORT.md

      - name: Upload security report summary
        uses: actions/upload-artifact@v3
        with:
          name: security-report-summary
          path: SECURITY_REPORT.md

      - name: Comment on PR with security summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('SECURITY_REPORT.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
        continue-on-error: true
