default_language_version:
  python: python3.11

repos:
  # Python formatting and style
  - repo: https://github.com/psf/black
    rev: 23.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=120]
        stages: [commit]

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--profile, black, --line-length, "120"]
        stages: [commit]

  # Linting
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --max-complexity=10]
        additional_dependencies:
          - flake8-docstrings
          - flake8-comprehensions
          - flake8-bugbear
        stages: [commit]

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.6.0
    hooks:
      - id: mypy
        additional_dependencies:
          - sqlalchemy
          - pydantic
          - types-all
        args: [--config-file=backend/mypy.ini]
        stages: [commit]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-ll]
        exclude: ^tests/
        stages: [commit]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline, --force-use-all-plugins]
        stages: [commit]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [commit]
      - id: end-of-file-fixer
        stages: [commit]
      - id: check-yaml
        args: [--unsafe]
        stages: [commit]
      - id: check-json
        stages: [commit]
      - id: check-merge-conflict
        stages: [commit]
      - id: check-case-conflict
        stages: [commit]
      - id: check-added-large-files
        args: [--maxkb=1000]
        stages: [commit]
      - id: check-docstring-first
        stages: [commit]
      - id: debug-statements
        stages: [commit]
      - id: mixed-line-ending
        args: [--fix=lf]
        stages: [commit]
      - id: name-tests-test
        args: [--pytest-test-first]
        stages: [commit]
      - id: requirements-txt-fixer
        stages: [commit]
      - id: detect-private-key
        stages: [commit]

  # JavaScript/TypeScript
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.53.0
    hooks:
      - id: eslint
        files: frontend/.*\.(jsx?|tsx?)$
        types: [javascript, typescript]
        args:
          - --max-warnings=0
          - --fix
        additional_dependencies:
          - eslint
          - eslint-config-react-app
          - eslint-plugin-react
          - eslint-plugin-react-hooks
          - eslint-plugin-prettier
          - prettier
        stages: [commit]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: frontend/.*\.(jsx?|tsx?|json|css|scss|md)$
        types: [javascript, typescript, json, markdown]
        args:
          - --write
          - --single-quote
          - --print-width=100
          - --tab-width=2
        stages: [commit]

  # YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.33.0
    hooks:
      - id: yamllint
        args:
          - --config-data
          - |
            {
              extends: default,
              rules: {
                line-length: {max: 120},
                indentation: {spaces: 2},
                comments: {min-spaces-from-content: 1}
              }
            }
        types: [yaml]
        stages: [commit]

  # Docker
  - repo: https://github.com/hadialqattan/pycln
    rev: v2.3.0
    hooks:
      - id: pycln
        args: [--all]
        stages: [commit]

  # Git checks
  - repo: https://github.com/gitpod-io/workspace-full
    rev: main
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
        stages: [commit]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [shellcheck]
  submodules: false
