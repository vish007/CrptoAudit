  # ============ ONBOARDING ENDPOINTS ============
  /onboarding/vasp:
    post:
      summary: Register VASP
      description: Register a new VASP for platform onboarding
      tags:
        - Onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company_name
                - contact_email
                - jurisdiction
              properties:
                company_name:
                  type: string
                contact_email:
                  type: string
                  format: email
                jurisdiction:
                  type: string
                vara_license_number:
                  type: string
                website:
                  type: string
                  format: uri
      responses:
        '201':
          description: VASP registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      tenant_id:
                        type: string
                        format: uuid
                      onboarding_token:
                        type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: VASP already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /onboarding/import-assets:
    post:
      summary: Import assets during onboarding
      description: Import crypto assets for a VASP during onboarding
      tags:
        - Onboarding
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - assets
              properties:
                assets:
                  type: array
                  items:
                    type: object
                    required:
                      - symbol
                      - blockchain
                    properties:
                      symbol:
                        type: string
                      blockchain:
                        type: string
                      wallet_addresses:
                        type: array
                        items:
                          type: string
      responses:
        '200':
          description: Assets imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      imported:
                        type: integer
                      failed:
                        type: integer
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /onboarding/import-wallets:
    post:
      summary: Import wallets during onboarding
      description: Import wallet addresses for assets
      tags:
        - Onboarding
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - wallets
              properties:
                wallets:
                  type: array
                  items:
                    type: object
                    required:
                      - address
                      - blockchain
                      - asset_symbol
                      - label
                    properties:
                      address:
                        type: string
                      blockchain:
                        type: string
                      asset_symbol:
                        type: string
                      label:
                        type: string
                      wallet_type:
                        type: string
      responses:
        '200':
          description: Wallets imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      imported:
                        type: integer
                      failed:
                        type: integer
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /onboarding/import-liabilities:
    post:
      summary: Import customer liabilities
      description: Import customer liability records
      tags:
        - Onboarding
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - liabilities
              properties:
                liabilities:
                  type: array
                  items:
                    type: object
                    required:
                      - customer_account_id
                      - asset_symbol
                      - balance
                    properties:
                      customer_account_id:
                        type: string
                      customer_label:
                        type: string
                      asset_symbol:
                        type: string
                      account_type:
                        type: string
                      balance:
                        type: string
                        format: decimal
      responses:
        '200':
          description: Liabilities imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      imported:
                        type: integer
                      failed:
                        type: integer
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /onboarding/status:
    get:
      summary: Get onboarding status
      description: Get onboarding completion status
      tags:
        - Onboarding
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      stage:
                        type: string
                        enum: [registration, assets, wallets, liabilities, complete]
                      progress_percentage:
                        type: integer
                      completed_steps:
                        type: array
                        items:
                          type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /onboarding/validate:
    post:
      summary: Validate onboarding data
      description: Validate all imported data before finalizing
      tags:
        - Onboarding
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Validation complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      valid:
                        type: boolean
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            field:
                              type: string
                            message:
                              type: string
                      warnings:
                        type: array
                        items:
                          type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
