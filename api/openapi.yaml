openapi: 3.1.0
info:
  title: SimplyFI Proof of Reserves Audit Platform API
  description: Comprehensive API for crypto asset auditing, Proof of Reserves verification, and compliance reporting
  version: 1.0.0
  contact:
    name: SimplyFI Support
    email: api-support@simplyfi.io
  license:
    name: Proprietary
    url: https://simplyfi.io/license

servers:
  - url: https://api.simplyfi.io/api/v1
    description: Production API
  - url: http://localhost:3001/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication and authorization
  - name: Users
    description: User management
  - name: Tenants
    description: Tenant/organization management
  - name: Engagements
    description: Audit engagement management
  - name: Assets
    description: Crypto asset management
  - name: Reserves
    description: Reserve verification and ratios
  - name: Merkle
    description: Merkle tree generation and verification
  - name: Blockchain
    description: Blockchain verification endpoints
  - name: Reports
    description: Report generation and management
  - name: AI
    description: AI-powered analysis and insights
  - name: Admin
    description: Administrative operations
  - name: Onboarding
    description: VASP onboarding workflows

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Error Schemas
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: Invalid request parameters
        details:
          type: object
          additionalProperties: true

    ValidationError:
      type: object
      required:
        - code
        - message
        - errors
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # Pagination
    PaginationMeta:
      type: object
      required:
        - page
        - per_page
        - total
        - total_pages
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        total_pages:
          type: integer
          example: 8

    PaginatedResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            type: object
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # Auth Schemas
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: SecurePassword123!
        mfa_code:
          type: string
          description: Optional MFA code if user has MFA enabled
          example: "123456"

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - first_name
        - last_name
        - company
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 12
        first_name:
          type: string
        last_name:
          type: string
        company:
          type: string
        tenant_id:
          type: string
          format: uuid
          description: Optional for VASP users joining existing tenant

    Token:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Seconds until token expiration
          example: 3600
        refresh_token:
          type: string
          description: Optional refresh token for obtaining new access tokens
        mfa_required:
          type: boolean
          description: Whether MFA is required to complete login
          example: false

    MFASetupRequest:
      type: object
      required:
        - method
      properties:
        method:
          type: string
          enum: [totp, sms]
          example: totp

    MFASetupResponse:
      type: object
      required:
        - secret
        - qr_code
      properties:
        secret:
          type: string
          description: Base32 encoded TOTP secret
        qr_code:
          type: string
          format: binary
          description: QR code for authenticator app
        backup_codes:
          type: array
          items:
            type: string
          description: One-time backup codes

    MFAVerifyRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          pattern: '^\d{6}$'
          example: "123456"

    # User Schemas
    User:
      type: object
      required:
        - id
        - email
        - first_name
        - last_name
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        avatar_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, inactive, suspended]
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        tenant_id:
          type: string
          format: uuid
        mfa_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time

    UserCreate:
      type: object
      required:
        - email
        - password
        - first_name
        - last_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 12
        first_name:
          type: string
        last_name:
          type: string
        role_ids:
          type: array
          items:
            type: string
            format: uuid
        tenant_id:
          type: string
          format: uuid

    UserUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        avatar_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, inactive, suspended]

    UserResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/User'

    # Tenant Schemas
    Tenant:
      type: object
      required:
        - id
        - name
        - type
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Kraken
        type:
          type: string
          enum: [vasp, auditor, regulator]
          example: vasp
        vara_license_number:
          type: string
          description: VARA license for VASP tenants
        description:
          type: string
        logo_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, inactive, suspended]
        member_count:
          type: integer
        settings:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantCreate:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum: [vasp, auditor, regulator]
        vara_license_number:
          type: string
        description:
          type: string
        logo_url:
          type: string
          format: uri

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        logo_url:
          type: string
          format: uri
        status:
          type: string
          enum: [active, inactive, suspended]

    TenantResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Tenant'

    TenantMember:
      type: object
      required:
        - id
        - email
        - first_name
        - last_name
        - roles
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        joined_at:
          type: string
          format: date-time

    # Role & Permission Schemas
    Permission:
      type: object
      required:
        - id
        - name
        - resource
        - action
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: view_engagement
        resource:
          type: string
          example: engagements
        action:
          type: string
          enum: [create, read, update, delete, export]
          example: read
        description:
          type: string

    Role:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Engagement Manager
        type:
          type: string
          enum: [system, custom]
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        user_count:
          type: integer
        created_at:
          type: string
          format: date-time

    # Engagement Schemas
    Engagement:
      type: object
      required:
        - id
        - vasp_tenant_id
        - auditor_tenant_id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        vasp_tenant_id:
          type: string
          format: uuid
        vasp_name:
          type: string
        auditor_tenant_id:
          type: string
          format: uuid
        auditor_name:
          type: string
        status:
          type: string
          enum: [planning, data_collection, verification, reporting, completed]
          example: data_collection
        audit_date:
          type: string
          format: date
          description: Snapshot date for the audit
        engagement_type:
          type: string
          enum: [full_audit, limited_scope, attestation]
          example: full_audit
        scope:
          type: object
          properties:
            assets:
              type: array
              items:
                type: string
              description: Asset symbols in scope
            wallets:
              type: array
              items:
                type: string
            blockchains:
              type: array
              items:
                type: string
        notes:
          type: string
        total_assets_usd:
          type: number
          format: double
          example: 1500000.00
        asset_count:
          type: integer
        wallet_count:
          type: integer
        customer_count:
          type: integer
        reserve_ratio:
          type: number
          format: double
          description: Latest reserve ratio percentage
          example: 101.5
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    EngagementCreate:
      type: object
      required:
        - vasp_tenant_id
        - auditor_tenant_id
        - audit_date
        - engagement_type
      properties:
        vasp_tenant_id:
          type: string
          format: uuid
        auditor_tenant_id:
          type: string
          format: uuid
        audit_date:
          type: string
          format: date
        engagement_type:
          type: string
          enum: [full_audit, limited_scope, attestation]
        scope:
          type: object
          properties:
            assets:
              type: array
              items:
                type: string
            blockchains:
              type: array
              items:
                type: string
        notes:
          type: string

    EngagementUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [planning, data_collection, verification, reporting, completed]
        notes:
          type: string
        scope:
          type: object

    EngagementResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Engagement'

    EngagementStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [planning, data_collection, verification, reporting, completed]
        notes:
          type: string

    # Asset Schemas
    CryptoAsset:
      type: object
      required:
        - id
        - symbol
        - name
        - asset_type
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
          example: BTC
        name:
          type: string
          example: Bitcoin
        asset_type:
          type: string
          enum: [tier_1, tier_2, tier_3]
          example: tier_1
        blockchains:
          type: array
          items:
            type: string
          example: [bitcoin]
        contract_addresses:
          type: object
          additionalProperties:
            type: string
          example:
            ethereum: '0x0000000000000000000000000000000000000000'
        decimals:
          type: integer
          example: 8
        logo_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    AssetCreate:
      type: object
      required:
        - symbol
        - name
        - asset_type
        - blockchains
      properties:
        symbol:
          type: string
        name:
          type: string
        asset_type:
          type: string
          enum: [tier_1, tier_2, tier_3]
        blockchains:
          type: array
          items:
            type: string
        contract_addresses:
          type: object
          additionalProperties:
            type: string
        decimals:
          type: integer
        logo_url:
          type: string
          format: uri

    AssetUpdate:
      type: object
      properties:
        name:
          type: string
        asset_type:
          type: string
          enum: [tier_1, tier_2, tier_3]
        blockchains:
          type: array
          items:
            type: string
        contract_addresses:
          type: object
          additionalProperties:
            type: string

    # Wallet Schemas
    WalletAddress:
      type: object
      required:
        - id
        - address
        - blockchain
        - asset_symbol
        - label
      properties:
        id:
          type: string
          format: uuid
        address:
          type: string
          example: '1A1z7agoat2LRGH3EiJjP73yq6fsKSvxzu'
        blockchain:
          type: string
          example: bitcoin
        asset_symbol:
          type: string
          example: BTC
        label:
          type: string
          description: Human-readable label for the wallet
          example: Exchange Reserve - Cold Storage 1
        wallet_type:
          type: string
          enum: [cold_storage, hot_wallet, custody, other]
        reported_balance:
          type: string
          format: decimal
          example: '15.5'
        on_chain_balance:
          type: string
          format: decimal
        balance_usd:
          type: number
          format: double
        variance:
          type: number
          format: double
          description: Percentage difference between reported and on-chain
        verified_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    AssetBalance:
      type: object
      required:
        - asset_symbol
        - total_reported_balance
        - total_on_chain_balance
        - wallet_count
      properties:
        asset_symbol:
          type: string
        asset_name:
          type: string
        total_reported_balance:
          type: string
          format: decimal
        total_on_chain_balance:
          type: string
          format: decimal
        total_balance_usd:
          type: number
          format: double
        variance_percentage:
          type: number
          format: double
        wallet_count:
          type: integer
        verified_count:
          type: integer
        wallets:
          type: array
          items:
            $ref: '#/components/schemas/WalletAddress'

    # Customer Liability Schemas
    CustomerLiability:
      type: object
      required:
        - id
        - engagement_id
        - customer_account_id
        - asset_symbol
        - reported_balance
      properties:
        id:
          type: string
          format: uuid
        engagement_id:
          type: string
          format: uuid
        customer_account_id:
          type: string
          description: Exchange's internal customer identifier
        customer_label:
          type: string
        asset_symbol:
          type: string
        account_type:
          type: string
          enum: [spot, margin, earning, staking, other]
        reported_balance:
          type: string
          format: decimal
        balance_usd:
          type: number
          format: double
        verified:
          type: boolean
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    # Reserve & Ratio Schemas
    ReserveRatio:
      type: object
      required:
        - engagement_id
        - asset_symbol
        - total_customer_liability
        - total_reserved_balance
        - reserve_ratio
      properties:
        engagement_id:
          type: string
          format: uuid
        asset_symbol:
          type: string
        asset_name:
          type: string
        total_customer_liability:
          type: string
          format: decimal
        total_reserved_balance:
          type: string
          format: decimal
        reserve_ratio:
          type: number
          format: double
          description: Percentage of liabilities covered by reserves
        liability_usd:
          type: number
          format: double
        reserves_usd:
          type: number
          format: double
        status:
          type: string
          enum: [compliant, warning, critical]
          description: Status based on minimum reserve requirements
        last_updated_at:
          type: string
          format: date-time

    ReserveSummary:
      type: object
      required:
        - engagement_id
        - total_liabilities_usd
        - total_reserves_usd
        - overall_reserve_ratio
        - asset_count
      properties:
        engagement_id:
          type: string
          format: uuid
        total_liabilities_usd:
          type: number
          format: double
        total_reserves_usd:
          type: number
          format: double
        overall_reserve_ratio:
          type: number
          format: double
        asset_count:
          type: integer
        asset_ratios:
          type: array
          items:
            $ref: '#/components/schemas/ReserveRatio'
        compliance_status:
          type: string
          enum: [compliant, warning, critical]
        flagged_assets:
          type: array
          items:
            type: object
            properties:
              asset_symbol:
                type: string
              reason:
                type: string
              ratio:
                type: number

    ReconciliationRecord:
      type: object
      required:
        - id
        - engagement_id
        - date
        - total_liability_usd
        - total_reserves_usd
      properties:
        id:
          type: string
          format: uuid
        engagement_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        total_liability_usd:
          type: number
          format: double
        total_reserves_usd:
          type: number
          format: double
        overall_ratio:
          type: number
          format: double
        asset_details:
          type: array
          items:
            $ref: '#/components/schemas/ReserveRatio'

    # Merkle Tree Schemas
    MerkleTree:
      type: object
      required:
        - id
        - engagement_id
        - root_hash
        - leaf_count
      properties:
        id:
          type: string
          format: uuid
        engagement_id:
          type: string
          format: uuid
        root_hash:
          type: string
          description: Root hash of the Merkle tree
        leaf_count:
          type: integer
          description: Number of customer records in tree
        tree_depth:
          type: integer
        hash_algorithm:
          type: string
          example: SHA256
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MerkleProof:
      type: object
      required:
        - customer_id
        - balance
        - proof
      properties:
        customer_id:
          type: string
        balance:
          type: string
          format: decimal
        leaf_index:
          type: integer
        proof:
          type: array
          items:
            type: string
          description: Array of sibling hashes to reconstruct root

    MerkleVerification:
      type: object
      required:
        - is_valid
        - root_hash
      properties:
        is_valid:
          type: boolean
        root_hash:
          type: string
        customer_count:
          type: integer
        verified_customers:
          type: integer
        errors:
          type: array
          items:
            type: object

    # Blockchain Verification Schemas
    DeFiPosition:
      type: object
      required:
        - id
        - engagement_id
        - protocol_name
        - position_type
        - balance
      properties:
        id:
          type: string
          format: uuid
        engagement_id:
          type: string
          format: uuid
        protocol_name:
          type: string
          example: Aave
        position_type:
          type: string
          enum: [lending, borrowing, liquidity_pool, staking]
        blockchain:
          type: string
          example: ethereum
        wallet_address:
          type: string
        asset_symbol:
          type: string
        balance:
          type: string
          format: decimal
        balance_usd:
          type: number
          format: double
        apy_percentage:
          type: number
          format: double
        verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    BlockchainVerificationResult:
      type: object
      required:
        - verified
        - blockchain
        - reported_balance
      properties:
        verified:
          type: boolean
        blockchain:
          type: string
        address:
          type: string
        reported_balance:
          type: string
          format: decimal
        on_chain_balance:
          type: string
          format: decimal
        variance_percentage:
          type: number
          format: double
        last_verified_block:
          type: integer
        verification_timestamp:
          type: string
          format: date-time

    # Report Schemas
    AuditReport:
      type: object
      required:
        - id
        - engagement_id
        - report_type
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        engagement_id:
          type: string
          format: uuid
        report_type:
          type: string
          enum: [por, assurance, management_letter, customer_summary]
        status:
          type: string
          enum: [draft, in_review, finalized, issued]
        title:
          type: string
        summary:
          type: string
        file_url:
          type: string
          format: uri
        pages:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid

    # Audit Log Schemas
    AuditLog:
      type: object
      required:
        - id
        - user_id
        - action
        - resource_type
        - timestamp
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_email:
          type: string
          format: email
        action:
          type: string
          enum: [create, read, update, delete, export, verify, generate]
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true
        ip_address:
          type: string
          format: ipv4
        user_agent:
          type: string
        status:
          type: string
          enum: [success, failure]
        timestamp:
          type: string
          format: date-time

security:
  - BearerAuth: []

paths:
  # ============ AUTH ENDPOINTS ============
  /auth/login:
    post:
      summary: User login
      description: Authenticate user with email and password, optionally with MFA
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Token'
        '400':
          description: Invalid credentials or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
