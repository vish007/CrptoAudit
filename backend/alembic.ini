# Alembic Configuration
# Path to migration scripts
script_location = alembic

# SQLAlchemy database URL
sqlalchemy.url = driver://user:password@localhost/dbname

# The encoding of files to use
encoding = utf-8

# When set to 'true', revision file
# headers will be written to be consistent.
file_template = %%(rev)s_%%(slug)s

# When files in the version/ directory end with .pyc, .pyo, or .orig,
# they are ignored by Alembic
ignore_patterns = ['.*', 'python.py']

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
