[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

markers =
    unit: Unit tests (run without external dependencies)
    integration: Integration tests (test interactions between components)
    e2e: End-to-end tests (test complete user workflows)
    slow: Tests that take a long time to run
    async: Tests that use async/await

addopts =
    -v
    --tb=short
    --strict-markers
    -ra

filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

timeout = 300
